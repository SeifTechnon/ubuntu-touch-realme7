name: Build Ubuntu Touch - Realme 7

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    timeout-minutes: 360

    env:
      VENDOR: realme
      DEVICE: salaa
      ANDROID_ROOT: /home/runner/work/halium/

    steps:
    - name: Checkout
      uses: actions/checkout@master

    - name: Cleanup Disk
      uses: HandsomeYingyan/cleanup-disk-action@v3.0

    - name: Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 8192
        build-mount-path: ${{ env.ANDROID_ROOT }}

    - name: Initialize Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-11-jdk android-tools-adb bc bison build-essential curl flex g++-multilib gcc-multilib gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc yasm zip zlib1g-dev git python3 python3-dev python-is-python3 libelf-dev ninja-build ccache
        sudo docker rmi $(docker images -q) 2>/dev/null || true
        sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php
        mkdir -p ~/bin
        wget -q https://storage.googleapis.com/git-repo-downloads/repo -P ~/bin
        chmod +x ~/bin/repo
        git config --global user.name "Realme7 UBports CI"
        git config --global user.email "ci@realme7.ubports.build"
        git config --global color.ui false
        mkdir -p ${{ env.ANDROID_ROOT }}
        df -h

    - name: Download Halium 12 Source
      run: |
        source halium.env
        cd $ANDROID_ROOT
        ~/bin/repo init -u https://github.com/Halium/android -b halium-12.0 --depth=1
        mkdir -p $ANDROID_ROOT/.repo/local_manifests
        wget -q https://raw.githubusercontent.com/${{ github.repository_owner }}/local_manifests/main/salaa.xml -O $ANDROID_ROOT/.repo/local_manifests/salaa.xml || true
        if [ ! -s "$ANDROID_ROOT/.repo/local_manifests/salaa.xml" ]; then
          echo '<?xml version="1.0" encoding="UTF-8"?><manifest><remote name="github" fetch="https://github.com/" /><project name="realme-kernel-opensource/realme7_realme8_Narzo30_Narzo20pro-AndroidS-kernel-source" path="kernel/realme/salaa" remote="github" revision="master" clone-depth="1" /><project name="Matrixx-Devices/android_device_realme_salaa" path="device/realme/salaa" remote="github" revision="lineage-20" clone-depth="1" /></manifest>' > $ANDROID_ROOT/.repo/local_manifests/salaa.xml
        fi
        ~/bin/repo sync -j8 -c --no-clone-bundle --no-tags
        df -h

    - name: Apply Halium Kernel Config
      run: |
        source halium.env
        CONFIG_DIR=$ANDROID_ROOT/kernel/realme/salaa/arch/arm64/configs
        printf 'CONFIG_NAMESPACES=y\nCONFIG_NET_NS=y\nCONFIG_PID_NS=y\nCONFIG_IPC_NS=y\nCONFIG_UTS_NS=y\nCONFIG_USER_NS=y\nCONFIG_SYSVIPC=y\nCONFIG_CGROUPS=y\nCONFIG_CGROUP_FREEZER=y\nCONFIG_CGROUP_DEVICE=y\nCONFIG_CGROUP_CPUACCT=y\nCONFIG_CGROUP_SCHED=y\nCONFIG_CPUSETS=y\nCONFIG_MEMCG=y\nCONFIG_MEMCG_SWAP=y\nCONFIG_BLK_CGROUP=y\nCONFIG_SECURITY=y\nCONFIG_SECURITY_APPARMOR=y\nCONFIG_DEFAULT_SECURITY_APPARMOR=y\nCONFIG_SECCOMP=y\nCONFIG_SECCOMP_FILTER=y\nCONFIG_AUDIT=y\nCONFIG_SECURITYFS=y\nCONFIG_DEVTMPFS=y\nCONFIG_DEVTMPFS_MOUNT=y\nCONFIG_TMPFS_POSIX_ACL=y\nCONFIG_TMPFS_XATTR=y\nCONFIG_EXT4_FS=y\nCONFIG_EXT4_FS_POSIX_ACL=y\nCONFIG_EXT4_FS_SECURITY=y\nCONFIG_FHANDLE=y\nCONFIG_NET=y\nCONFIG_UNIX=y\nCONFIG_INET=y\nCONFIG_IPV6=y\nCONFIG_NETFILTER=y\nCONFIG_NETFILTER_ADVANCED=y\nCONFIG_NF_CONNTRACK=y\nCONFIG_ANDROID_PARANOID_NETWORK=n\nCONFIG_ANDROID_BINDER_IPC=y\nCONFIG_ASHMEM=y\nCONFIG_EPOLL=y\nCONFIG_SIGNALFD=y\nCONFIG_TIMERFD=y\nCONFIG_EVENTFD=y\nCONFIG_AIO=y\nCONFIG_PSI=y\nCONFIG_MEMFD_CREATE=y\n' > $CONFIG_DIR/halium.config
        echo "halium.config created"
        cat $CONFIG_DIR/halium.config

    - name: Build HAL
      run: |
        chmod +x build-hal.sh
        bash -x build-hal.sh
      shell: bash

    - name: Upload halium-boot.img
      if: always()
      uses: actions/upload-artifact@master
      with:
        name: halium-boot-realme7-android12
        path: ${{ env.ANDROID_ROOT }}/out/target/product/salaa/halium-boot.img
        retention-days: 30

    - name: Upload system.img
      if: always()
      uses: actions/upload-artifact@master
      with:
        name: system-realme7-android12
        path: ${{ env.ANDROID_ROOT }}/out/target/product/salaa/system.img
        retention-days: 30

    - name: Upload vendor.img
      if: always()
      uses: actions/upload-artifact@master
      with:
        name: vendor-realme7-android12
        path: ${{ env.ANDROID_ROOT }}/out/target/product/salaa/vendor.img
        retention-days: 30

    - name: Build Summary
      if: always()
      run: |
        echo "======================================="
        echo "Build Summary - Realme 7 Ubuntu Touch"
        echo "Device: salaa (RMX2163) - Android 12"
        echo "======================================="
        OUT=${{ env.ANDROID_ROOT }}/out/target/product/salaa
        for img in halium-boot.img system.img vendor.img; do
          if [ -f "$OUT/$img" ]; then
            SIZE=$(du -sh $OUT/$img | cut -f1)
            echo "OK: $img ($SIZE)"
          else
            echo "MISSING: $img"
          fi
        done
        echo "======================================="
